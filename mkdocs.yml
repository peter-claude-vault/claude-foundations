site_name: Claude Stem — vault construction research
site_description: System-altitude research packets and governance reference for the Claude Stem foundation-repo.
site_url: https://stem.peter.dev/
repo_url: https://github.com/peter-claude-vault/claude-stem
repo_name: peter-claude-vault/claude-stem
edit_uri: edit/v2-engine/

docs_dir: .
site_dir: _site

# Scope --strict mode to actual docs sources. Non-docs paths in the repo
# (governance JSONs, schemas, skills, tests, hooks, templates, installer,
# connector wizard, drafts, Obsidian metadata) are walked-but-excluded so
# broken wikilinks in those files don't fail the docs build.
exclude_docs: |
  governance/
  schemas/
  skills/
  tests/
  _doc-overhaul/
  onboarding/
  hooks/
  templates/
  installer/
  connectors/
  git-hooks/
  .makemd/
  .obsidian/
  .space/
  Logs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - tags

nav:
  - Home: index.md
  - Research:
      - research/vault-construction/_index.md
      - Construction principles: research/vault-construction/vault-construction-principles.md
      - Frontmatter design: research/vault-construction/frontmatter-design.md
      - Tagging strategy: research/vault-construction/tagging-strategy.md
      - File-naming conventions: research/vault-construction/file-naming-conventions.md
      - Content-length limits: research/vault-construction/content-length-limits.md
      - CLAUDE.md design: research/vault-construction/claude-md-design.md
      - "`_index.md` design": research/vault-construction/_index.md-design.md
      - Inbox-flow architecture: research/vault-construction/inbox-flow-architecture.md
  - Decisions:
      - docs/decisions/README.md
      - "ADR-0001 Tiered compliance": docs/decisions/0001-tiered-compliance.md
      - "ADR-0002 Unified-with-per-archetype-entries": docs/decisions/0002-unified-with-per-archetype-entries.md
      - "ADR-0003 Folder-lineage as fields": docs/decisions/0003-folder-lineage-as-fields.md
      - "ADR-0004 System-utility dimension exemption": docs/decisions/0004-system-utility-dimension-exemption.md
      - "ADR-0005 Two-surface governance dual pattern": docs/decisions/0005-two-surface-governance-dual-pattern.md
      - "ADR-0006 Layer-3 overlay collision tiebreaker": docs/decisions/0006-layer3-overlay-collision-tiebreaker.md
  - Contributing: CONTRIBUTING.md
  - README: README.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/peter-claude-vault/claude-stem

# URL-stable contract: paths under /research/vault-construction/<slug>/ are
# locked from 2026-05-12. Restructures require a redirect plan landing in the
# same R-37 lockstep commit as the structural change.
