name: docs

on:
  push:
    branches:
      - v2-engine
      - main
    paths:
      - "research/**"
      - "docs/**"
      - "governance/**"
      - "schemas/**"
      - "mkdocs.yml"
      - "CNAME"
      - "README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mkdocs-material + plugins
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs-material==9.* \
            pymdown-extensions==10.* \
            mkdocs-git-revision-date-localized-plugin

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# URL-stable contract: deployed paths under /research/vault-construction/<slug>/
# are locked from 2026-05-12. The workflow runs with --strict so broken
# wikilinks fail the build rather than deploying silently.
