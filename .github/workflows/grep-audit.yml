name: grep-audit

# 4-layer reference-leak audit per SP00 T-7. Fires on:
#   - every push (catches direct commits)
#   - every pull_request (blocks merge on any layer hit)
#   - every release tag (re-runs against the tagged tree + built tarball)
#   - monthly schedule (30-day drift re-audit)
#
# Python is pinned to prevent Layer 2 (NFKC) normalization drift across
# `unicodedata` releases.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  release:
    types: [published]
  schedule:
    # First of each month, 09:00 UTC.
    - cron: '0 9 1 * *'

permissions:
  contents: read

jobs:
  audit-source-tree:
    name: audit source tree (4 layers)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history (Layer 4 needs all commits)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pin Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run grep-audit against source tree
        run: |
          chmod +x tests/grep-audit.sh
          ./tests/grep-audit.sh .

      - name: Run unit test (validates each fixture fires its layer)
        run: |
          chmod +x tests/grep-audit-unit-test.sh \
                   tests/dogfood-root-helper.sh \
                   tests/grep-audit-fixtures/generate.sh
          ./tests/grep-audit-unit-test.sh

  audit-lima-config-label:
    name: lima/foundations.yaml mutation requires isolation-config-review label
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether this PR mutates lima/foundations.yaml
        id: diff
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base...$head" | grep -Fx 'lima/foundations.yaml' > /dev/null; then
            echo "mutates=1" >> "$GITHUB_OUTPUT"
          else
            echo "mutates=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Require isolation-config-review label
        if: steps.diff.outputs.mutates == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          labels=$(gh pr view "${{ github.event.pull_request.number }}" --json labels --jq '.labels[].name' || true)
          echo "$labels" | grep -Fx 'isolation-config-review' > /dev/null || {
            echo "::error::PR mutates lima/foundations.yaml but 'isolation-config-review' label is absent."
            echo "Re-review the isolation invariants (mounts:[], mount audit, ENOENT check) before merge."
            exit 1
          }
