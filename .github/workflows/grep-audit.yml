name: grep-audit

# 4-layer reference-leak audit per SP00 T-7. Fires on:
#   - every push (catches direct commits)
#   - every pull_request (blocks merge on any layer hit)
#   - every release tag (re-runs against the tagged tree + built tarball)
#   - monthly schedule (30-day drift re-audit)
#
# Python is pinned to prevent Layer 2 (NFKC) normalization drift across
# `unicodedata` releases.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  release:
    types: [published]
  schedule:
    # First of each month, 09:00 UTC.
    - cron: '0 9 1 * *'

permissions:
  contents: read

jobs:
  audit-source-tree:
    name: audit source tree (4 layers)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history (Layer 4 needs all commits)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pin Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run grep-audit against source tree (per-layer baseline gate)
        run: |
          # Per-layer evaluation. Current-tree layers (1-3) are strict zero —
          # any new leak fails CI. Layer 4 (git-log-all-p historical audit)
          # carries a documented baseline of 1 hit from a vestigial test
          # fixture in pre-v2 commit history; gate on `<= baseline` to allow
          # the known historical state without permitting NEW historical
          # leaks. Documented baseline lives in tests/grep-audit-baseline.json
          # alongside the script for single-source-of-truth.
          chmod +x tests/grep-audit.sh
          OUTPUT=$(./tests/grep-audit.sh . 2>&1) || true
          JSON=$(printf '%s\n' "$OUTPUT" | grep -E '^\{"target"' | tail -1)
          if [ -z "$JSON" ]; then
            printf '::error::grep-audit produced no JSON line\n%s\n' "$OUTPUT" >&2
            exit 1
          fi
          printf '%s\n' "$JSON"
          L1=$(printf '%s' "$JSON" | jq '.layer1')
          L2=$(printf '%s' "$JSON" | jq '.layer2')
          L3=$(printf '%s' "$JSON" | jq '.layer3')
          L4=$(printf '%s' "$JSON" | jq '.layer4')
          L4_BASELINE=$(jq '.layer4_baseline' tests/grep-audit-baseline.json)
          if [ "$L1" -gt 0 ] || [ "$L2" -gt 0 ] || [ "$L3" -gt 0 ]; then
            printf '::error::grep-audit current-tree leak — layer1=%s layer2=%s layer3=%s (must all be 0)\n' \
              "$L1" "$L2" "$L3" >&2
            printf '%s\n' "$OUTPUT" >&2
            exit 1
          fi
          if [ "$L4" -gt "$L4_BASELINE" ]; then
            printf '::error::grep-audit Layer 4 hits=%s exceeds documented baseline=%s — historical leak introduced\n' \
              "$L4" "$L4_BASELINE" >&2
            printf '%s\n' "$OUTPUT" >&2
            exit 1
          fi
          printf 'grep-audit pass: l1=%s l2=%s l3=%s l4=%s (baseline=%s)\n' \
            "$L1" "$L2" "$L3" "$L4" "$L4_BASELINE"

      - name: Run unit test (validates each fixture fires its layer)
        run: |
          chmod +x tests/grep-audit-unit-test.sh \
                   tests/dogfood-root-helper.sh \
                   tests/grep-audit-fixtures/generate.sh
          ./tests/grep-audit-unit-test.sh

      - name: Run bypass-audit (T-12 — flags direct container-runtime shells skipping runner-shell)
        run: |
          chmod +x tests/bypass-audit.sh tests/bypass-audit-unit-test.sh
          ./tests/bypass-audit.sh .
          ./tests/bypass-audit-unit-test.sh

  audit-lima-config-label:
    name: lima/foundations.yaml mutation requires isolation-config-review label
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether this PR mutates lima/foundations.yaml
        id: diff
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base...$head" | grep -Fx 'lima/foundations.yaml' > /dev/null; then
            echo "mutates=1" >> "$GITHUB_OUTPUT"
          else
            echo "mutates=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Require isolation-config-review label
        if: steps.diff.outputs.mutates == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          labels=$(gh pr view "${{ github.event.pull_request.number }}" --json labels --jq '.labels[].name' || true)
          echo "$labels" | grep -Fx 'isolation-config-review' > /dev/null || {
            echo "::error::PR mutates lima/foundations.yaml but 'isolation-config-review' label is absent."
            echo "Re-review the isolation invariants (mounts:[], mount audit, ENOENT check) before merge."
            exit 1
          }
